name: CI Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci
      
      - name: Lint
        working-directory: ${{ matrix.service }}
        run: npm run lint || echo "Lint not configured yet"
      
      - name: Test
        working-directory: ${{ matrix.service }}
        run: npm run test || echo "Tests not configured yet"

  build-and-smoke-test:
    name: Build and Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service: [backend, frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        working-directory: ${{ matrix.service }}
        run: docker build -t ${{ matrix.service }}:latest .
      
      - name: Smoke Test - Backend
        if: matrix.service == 'backend'
        run: |
          docker run -d -p 3000:3000 --name backend-test ${{ matrix.service }}:latest
          sleep 10
          curl -f http://localhost:3000/health || (docker logs backend-test; exit 1)
          docker stop backend-test
          docker rm backend-test
      
      - name: Smoke Test - Frontend
        if: matrix.service == 'frontend'
        run: |
          docker run -d -p 80:80 --name frontend-test ${{ matrix.service }}:latest
          sleep 5
          curl -f http://localhost:80 || (docker logs frontend-test; exit 1)
          docker stop frontend-test
          docker rm frontend-test
